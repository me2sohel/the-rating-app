<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rating App | Trust Every Rating</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header>
        <nav class="navbar">

            <div class="logo">
                🌍 <span>The Rating App</span>
            </div>

            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Explore</a></li>
                <li><a href="#">Businesses</a></li>
                <li><a href="#">About</a></li>
            </ul>
            <div class="nav-buttons">
                <button class="login-btn">Login</button>
                <button class="register-btn">Register</button>
            </div>
        </nav>
    </header>



    <!-- ================= HERO ================= -->

    <section class="hero">

        <div class="hero-content">

            <h1>
                Trust Every Rating.
            </h1>
            <p>
                Discover trusted restaurants, hospitals, schools,
                cafés and millions of businesses through
                genuine verified experiences.
            </p>

            <div class="search-box">
                <input
                    type="text"
                    placeholder="Search restaurants, hospitals, cafés...">
                <button>
                    Search
                </button>
            </div>

            <div class="hero-buttons">
                <button class="primary-btn">
                    📍 Near Me
                </button>
                <button class="secondary-btn">
                    ⭐ Explore
                </button>
            </div>

        </div>



        <div class="hero-image">
            <img
                src="assets/hero-placeholder.svg"
                alt="World Map">
        </div>

    </section>

</body>

</html>
